name: Deal Radar pricing

# Runs price_pending_deals.py on a schedule that doesn't depend on any local
# machine being on -- the Gmail-fetch half of the pipeline still runs as a
# separate claude.ai scheduled routine (cloud egress there can't reach
# serpapi.com, see TODO.md item 4); this workflow does the pricing/email half
# instead, since GitHub-hosted runners have normal outbound internet access.
on:
  # Primary trigger: run as soon as the cloud capture routine commits new pending
  # deals (it pushes deal_log.json). This prices with minimal latency and no wasted
  # no-op runs. The pricing job's own commit carries "[skip ci]" so it never loops.
  push:
    branches: [main]
    paths:
      - "deal_log.json"
  # Safety net: drains any overflow beyond CAP_PER_RUN and covers a missed push.
  schedule:
    - cron: "47 */4 * * *" # every 4h, shortly after the 4-hourly capture routine
  workflow_dispatch: {} # allows manual "Run workflow" for testing

permissions:
  contents: write # needs to commit/push deal_log.json updates

jobs:
  price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pricing dependencies
        # Only the pricing runtime deps (requests) -- not the full Streamlit/NumPy
        # app stack, which this job never imports.
        run: pip install -r requirements-pipeline.txt

      - name: Configure git identity for commits made by this workflow
        run: |
          git config user.name "Deal Radar bot"
          git config user.email "deal-radar-bot@users.noreply.github.com"

      - name: Price pending deals
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 price_pending_deals.py
